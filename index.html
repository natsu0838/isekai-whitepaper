<!DOCTYPE html>
<html lang="ja" data-lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISEKAI — Server Whitepaper</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Shippori+Mincho:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ======================================================
   ISEKAI Whitepaper — Stylesheet
   Theme: Norse myth · warm hearth · friendly hall
   ====================================================== */

:root {
  /* Palette — deep night sky over a hearth-warm hall */
  --ink:           #0e1620;   /* deep night */
  --ink-soft:      #1a2330;
  --parchment:     #f4ead5;   /* warm parchment */
  --parchment-2:   #ebdfc4;
  --vellum:        #e2d2ad;
  --gold:          #c9a24a;   /* hearth gold */
  --gold-deep:     #a47e2e;
  --gold-light:    #e8c97a;
  --ember:         #d96d3a;   /* friendly ember */
  --moss:          #6b8e5a;   /* forest moss */
  --rune-blue:     #4a6b8a;
  --crimson:       #8b3a3a;   /* important / warning */
  
  --shadow-warm:   0 4px 20px rgba(164, 126, 46, 0.15);
  --shadow-deep:   0 12px 40px rgba(14, 22, 32, 0.4);
  
  --font-display:  'Cinzel', 'Shippori Mincho', serif;
  --font-display-ja: 'Shippori Mincho', 'Cinzel', serif;
  --font-display-zh: 'Noto Serif SC', 'Shippori Mincho', serif;
  --font-display-vi: 'Cormorant Garamond', 'Cinzel', serif;
  --font-body:     'Cormorant Garamond', 'Shippori Mincho', serif;
  --font-body-ja:  'Shippori Mincho', 'Cormorant Garamond', serif;
  --font-body-zh:  'Noto Serif SC', 'Shippori Mincho', serif;
  --font-body-vi:  'Cormorant Garamond', serif;
  --font-mono:     'JetBrains Mono', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  background: var(--ink);
  color: var(--parchment);
  font-family: var(--font-body-ja);
  font-size: 17px;
  line-height: 1.85;
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

html[data-lang="en"] body {
  font-family: var(--font-body);
}

html[data-lang="zh"] body {
  font-family: var(--font-body-zh);
}

html[data-lang="vi"] body {
  font-family: var(--font-body-vi);
}

/* --- Atmospheric background: aurora over fjord (fallback when video masks out) --- */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 50% at 20% 10%, rgba(74, 107, 138, 0.25), transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 30%, rgba(107, 142, 90, 0.15), transparent 60%),
    radial-gradient(ellipse 100% 60% at 50% 100%, rgba(201, 162, 74, 0.08), transparent 70%),
    linear-gradient(180deg, #0a1018 0%, #0e1620 40%, #131c28 100%);
  z-index: -3;
}

/* --- Ambient background video --- */
.bg-video {
  position: fixed;
  inset: 0;
  z-index: -2;
  overflow: hidden;
  pointer-events: none;
}

.bg-video #ytPlayer,
.bg-video iframe {
  position: absolute;
  top: 50%;
  left: 50%;
  /* Always cover the viewport at 16:9 aspect */
  width: max(100vw, 177.78vh);
  height: max(56.25vw, 100vh);
  transform: translate(-50%, -50%);
  border: 0;
  pointer-events: none;
  /* Fade the video into the surrounding dark so edges feel blurred */
  -webkit-mask-image: radial-gradient(ellipse 70% 75% at center, rgba(0,0,0,1) 35%, rgba(0,0,0,0) 100%);
          mask-image: radial-gradient(ellipse 70% 75% at center, rgba(0,0,0,1) 35%, rgba(0,0,0,0) 100%);
  filter: blur(1.5px) brightness(0.38) saturate(0.8);
}

.bg-video__overlay {
  position: absolute;
  inset: 0;
  pointer-events: none;
  background:
    radial-gradient(ellipse 75% 70% at 50% 45%, rgba(14,22,32,0.4) 20%, rgba(14,22,32,0.8) 75%, rgba(14,22,32,0.98) 100%),
    linear-gradient(180deg, rgba(14,22,32,0.4) 0%, rgba(14,22,32,0.6) 100%);
}

body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3CfeColorMatrix values='0 0 0 0 0.95 0 0 0 0 0.85 0 0 0 0 0.6 0 0 0 0.04 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  z-index: -1;
  pointer-events: none;
  opacity: 0.5;
}

/* --- Floating rune particles --- */
.rune-particle {
  position: fixed;
  font-family: serif;
  color: var(--gold);
  opacity: 0.06;
  pointer-events: none;
  z-index: -1;
  user-select: none;
  animation: drift 60s linear infinite;
}

@keyframes drift {
  0%   { transform: translateY(100vh) rotate(0deg); }
  100% { transform: translateY(-20vh) rotate(360deg); }
}

/* ======================================================
   TOP BAR — language toggle, version
   ====================================================== */
.topbar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 32px;
  background: linear-gradient(180deg, rgba(14,22,32,0.95) 0%, rgba(14,22,32,0.7) 70%, transparent);
  backdrop-filter: blur(8px);
}

.topbar__brand {
  font-family: var(--font-display);
  letter-spacing: 0.4em;
  font-size: 13px;
  color: var(--gold);
  font-weight: 600;
}

.topbar__brand::before {
  content: '◈ ';
  color: var(--gold-deep);
}

.lang-toggle {
  background: transparent;
  border: 1px solid var(--gold-deep);
  color: var(--gold-light);
  padding: 8px 18px;
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 0.15em;
  cursor: pointer;
  transition: all 0.3s ease;
  border-radius: 2px;
}

.lang-toggle:hover {
  background: var(--gold);
  color: var(--ink);
  box-shadow: 0 0 20px rgba(201, 162, 74, 0.4);
}

/* --- Language dropdown menu --- */
.lang-menu {
  position: relative;
}

.lang-toggle {
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

.lang-toggle-caret {
  font-size: 10px;
  color: var(--gold-deep);
  transition: transform 0.2s ease;
}

.lang-toggle:hover .lang-toggle-caret {
  color: var(--ink);
}

.lang-menu.open .lang-toggle-caret {
  transform: rotate(180deg);
}

.lang-dropdown {
  position: absolute;
  top: calc(100% + 8px);
  right: 0;
  min-width: 160px;
  margin: 0;
  padding: 4px;
  list-style: none;
  background: rgba(14, 22, 32, 0.96);
  backdrop-filter: blur(10px);
  border: 1px solid var(--gold-deep);
  border-radius: 2px;
  box-shadow: var(--shadow-deep);
  z-index: 200;
}

.lang-dropdown[hidden] {
  display: none;
}

.lang-dropdown li {
  margin: 0;
}

.lang-dropdown button {
  display: block;
  width: 100%;
  padding: 10px 16px;
  background: transparent;
  border: none;
  color: var(--vellum);
  font-size: 14px;
  letter-spacing: 0.08em;
  text-align: left;
  cursor: pointer;
  border-radius: 2px;
  transition: background 0.2s ease, color 0.2s ease;
}

.lang-dropdown button[data-lang="ja"] { font-family: var(--font-display-ja); }
.lang-dropdown button[data-lang="en"] { font-family: var(--font-display); }
.lang-dropdown button[data-lang="zh"] { font-family: var(--font-display-zh); }
.lang-dropdown button[data-lang="vi"] { font-family: var(--font-display-vi); }

.lang-dropdown button:hover {
  background: rgba(201, 162, 74, 0.12);
  color: var(--parchment);
}

.lang-dropdown button[aria-current="true"] {
  background: rgba(201, 162, 74, 0.18);
  color: var(--gold-light);
}

.lang-dropdown button[aria-current="true"]::before {
  content: '◆ ';
  color: var(--gold);
  font-size: 10px;
}

/* ======================================================
   HERO
   ====================================================== */
.hero {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 120px 32px 80px;
  text-align: center;
  position: relative;
}

.hero__rune-frame {
  font-family: serif;
  color: var(--gold);
  font-size: 18px;
  letter-spacing: 0.8em;
  margin-bottom: 32px;
  opacity: 0;
  animation: fadeUp 1.2s ease 0.2s forwards;
}

.hero__eyebrow {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.5em;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 28px;
  opacity: 0;
  animation: fadeUp 1.2s ease 0.4s forwards;
}

.hero__server-name {
  font-family: var(--font-display);
  font-size: clamp(72px, 14vw, 180px);
  font-weight: 700;
  letter-spacing: 0.15em;
  color: var(--parchment);
  line-height: 1;
  margin-bottom: 24px;
  opacity: 0;
  animation: fadeUp 1.4s ease 0.6s forwards;
  background: linear-gradient(180deg, var(--parchment) 0%, var(--vellum) 50%, var(--gold) 100%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: 0 4px 30px rgba(201, 162, 74, 0.2);
}

.hero__title {
  font-family: var(--font-display-ja);
  font-size: clamp(20px, 3vw, 32px);
  font-weight: 500;
  letter-spacing: 0.3em;
  color: var(--vellum);
  margin-bottom: 40px;
  opacity: 0;
  animation: fadeUp 1.4s ease 0.8s forwards;
}

html[data-lang="en"] .hero__title {
  font-family: var(--font-display);
  letter-spacing: 0.2em;
}

html[data-lang="zh"] .hero__title {
  font-family: var(--font-display-zh);
  letter-spacing: 0.15em;
}

html[data-lang="vi"] .hero__title {
  font-family: var(--font-display-vi);
  letter-spacing: 0.2em;
}

.hero__divider {
  width: 240px;
  height: 1px;
  margin: 0 auto 40px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  position: relative;
  opacity: 0;
  animation: fadeUp 1.4s ease 1s forwards;
}

.hero__divider::before {
  content: '✦';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: var(--ink);
  color: var(--gold);
  padding: 0 16px;
  font-size: 14px;
}

.hero__subtitle {
  font-family: var(--font-body-ja);
  font-style: italic;
  font-size: clamp(16px, 2vw, 22px);
  color: var(--gold-light);
  margin-bottom: 48px;
  letter-spacing: 0.05em;
  opacity: 0;
  animation: fadeUp 1.4s ease 1.2s forwards;
}

html[data-lang="en"] .hero__subtitle {
  font-family: var(--font-body);
}

html[data-lang="zh"] .hero__subtitle {
  font-family: var(--font-body-zh);
}

html[data-lang="vi"] .hero__subtitle {
  font-family: var(--font-body-vi);
}

.hero__intro {
  max-width: 720px;
  margin: 0 auto;
  font-size: clamp(15px, 1.5vw, 17px);
  line-height: 2;
  color: var(--parchment);
  opacity: 0;
  animation: fadeUp 1.4s ease 1.4s forwards;
  text-align: justify;
  text-align-last: center;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

.hero__scroll-hint {
  position: absolute;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.4em;
  color: var(--gold);
  opacity: 0;
  animation: fadeUp 1.4s ease 1.8s forwards, bob 2s ease-in-out 2.5s infinite;
}

@keyframes bob {
  0%, 100% { transform: translate(-50%, 0); }
  50%      { transform: translate(-50%, 8px); }
}

/* ======================================================
   NAVIGATION (sticky chapter index)
   ====================================================== */
.nav-section {
  padding: 80px 32px 40px;
  max-width: 1100px;
  margin: 0 auto;
}

.nav-section__title {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.4em;
  color: var(--gold);
  text-align: center;
  margin-bottom: 32px;
  text-transform: uppercase;
}

.nav-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 12px;
  list-style: none;
}

.nav-grid a {
  display: block;
  padding: 16px 20px;
  background: rgba(244, 234, 213, 0.03);
  border: 1px solid rgba(201, 162, 74, 0.15);
  border-radius: 2px;
  color: var(--vellum);
  text-decoration: none;
  font-size: 14px;
  letter-spacing: 0.05em;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

.nav-grid a::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 3px;
  background: var(--gold);
  transform: scaleY(0);
  transition: transform 0.3s ease;
  transform-origin: bottom;
}

.nav-grid a:hover {
  background: rgba(201, 162, 74, 0.08);
  border-color: var(--gold-deep);
  color: var(--parchment);
  transform: translateX(4px);
}

.nav-grid a:hover::before {
  transform: scaleY(1);
  transform-origin: top;
}

.nav-grid .num {
  font-family: var(--font-display);
  color: var(--gold);
  margin-right: 12px;
  font-size: 12px;
  letter-spacing: 0.1em;
}

/* ======================================================
   CONTENT — Chapters
   ====================================================== */
.content {
  max-width: 920px;
  margin: 0 auto;
  padding: 60px 32px 100px;
}

.chapter {
  margin-bottom: 100px;
  position: relative;
  opacity: 0;
  transform: translateY(30px);
  transition: all 0.8s ease;
}

.chapter.visible {
  opacity: 1;
  transform: translateY(0);
}

.chapter__header {
  display: flex;
  align-items: baseline;
  gap: 24px;
  margin-bottom: 16px;
  padding-bottom: 24px;
  border-bottom: 1px solid rgba(201, 162, 74, 0.25);
  position: relative;
}

.chapter__header::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 0;
  width: 80px;
  height: 2px;
  background: var(--gold);
}

.chapter__number {
  font-family: var(--font-display);
  font-size: clamp(40px, 6vw, 68px);
  font-weight: 400;
  color: var(--gold);
  line-height: 1;
  flex-shrink: 0;
  text-shadow: 0 2px 20px rgba(201, 162, 74, 0.3);
}

.chapter__icon {
  font-size: clamp(28px, 4vw, 40px);
  color: var(--gold-light);
  margin-right: 8px;
}

.chapter__title {
  font-family: var(--font-display-ja);
  font-size: clamp(22px, 3vw, 32px);
  font-weight: 600;
  color: var(--parchment);
  letter-spacing: 0.08em;
  flex-grow: 1;
}

html[data-lang="en"] .chapter__title {
  font-family: var(--font-display);
  letter-spacing: 0.05em;
}

html[data-lang="zh"] .chapter__title {
  font-family: var(--font-display-zh);
  letter-spacing: 0.05em;
}

html[data-lang="vi"] .chapter__title {
  font-family: var(--font-display-vi);
  letter-spacing: 0.05em;
}

.chapter--important .chapter__title {
  color: var(--gold-light);
}

.chapter--important .chapter__header::after {
  background: var(--ember);
  width: 120px;
}

.chapter__lead {
  font-family: var(--font-body-ja);
  font-style: italic;
  font-size: clamp(16px, 1.8vw, 19px);
  color: var(--gold-light);
  margin: 24px 0 32px;
  padding-left: 24px;
  border-left: 2px solid var(--gold-deep);
  line-height: 1.9;
  letter-spacing: 0.02em;
}

html[data-lang="en"] .chapter__lead {
  font-family: var(--font-body);
}

html[data-lang="zh"] .chapter__lead {
  font-family: var(--font-body-zh);
}

html[data-lang="vi"] .chapter__lead {
  font-family: var(--font-body-vi);
}

/* --- Rules list --- */
.rules-list {
  list-style: none;
  margin-top: 24px;
}

.rules-list li {
  padding: 18px 0 18px 44px;
  position: relative;
  border-bottom: 1px dashed rgba(201, 162, 74, 0.15);
  line-height: 1.85;
  color: var(--parchment);
}

.rules-list li:last-child {
  border-bottom: none;
}

.rules-list li::before {
  content: '◆';
  position: absolute;
  left: 12px;
  top: 22px;
  color: var(--gold);
  font-size: 12px;
}

.rules-list li.note {
  font-size: 14px;
  color: var(--vellum);
  opacity: 0.85;
  font-style: italic;
  padding-left: 60px;
}

.rules-list li.note::before {
  content: '※';
  left: 28px;
  top: 18px;
  color: var(--moss);
}

/* --- Subsections (used in boss chapter) --- */
.subsection {
  margin-top: 36px;
  padding: 28px 32px;
  background: linear-gradient(135deg, rgba(244, 234, 213, 0.04) 0%, rgba(201, 162, 74, 0.03) 100%);
  border: 1px solid rgba(201, 162, 74, 0.2);
  border-radius: 2px;
  position: relative;
}

.subsection::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 40px;
  height: 1px;
  background: var(--gold);
}

.subsection__heading {
  font-family: var(--font-display-ja);
  font-size: 16px;
  letter-spacing: 0.2em;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 16px;
  font-weight: 600;
}

html[data-lang="en"] .subsection__heading {
  font-family: var(--font-display);
}

html[data-lang="zh"] .subsection__heading {
  font-family: var(--font-display-zh);
}

html[data-lang="vi"] .subsection__heading {
  font-family: var(--font-display-vi);
}

.subsection .rules-list li {
  border-bottom-color: rgba(201, 162, 74, 0.1);
  padding: 12px 0 12px 36px;
}

.subsection .rules-list li::before {
  top: 16px;
  left: 6px;
}

/* HP threshold special styling */
.subsection .rules-list li:has-text('50%'),
.subsection .rules-list li {
  font-size: 16px;
}

.chapter--important .subsection {
  border-color: rgba(217, 109, 58, 0.25);
  background: linear-gradient(135deg, rgba(217, 109, 58, 0.04) 0%, rgba(201, 162, 74, 0.03) 100%);
}

.chapter--important .subsection::before {
  background: var(--ember);
}

.chapter--important .subsection__heading {
  color: var(--ember);
}

/* --- Flow diagram (enforcement steps) --- */
.flow {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-top: 20px;
}

.subsection .rules-list + .flow {
  margin-top: 24px;
  padding-top: 20px;
  border-top: 1px dashed rgba(201, 162, 74, 0.2);
}

.flow__step {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 14px 18px;
  background: rgba(201, 162, 74, 0.05);
  border: 1px solid rgba(201, 162, 74, 0.25);
  border-radius: 4px;
  transition: background 0.3s ease, border-color 0.3s ease;
}

.flow__step:hover {
  background: rgba(201, 162, 74, 0.09);
  border-color: rgba(201, 162, 74, 0.4);
}

.flow__step-icon {
  font-size: 22px;
  color: var(--gold);
  flex-shrink: 0;
  width: 36px;
  text-align: center;
  line-height: 1;
}

.flow__step-body {
  color: var(--parchment);
  line-height: 1.65;
  font-size: 15px;
  letter-spacing: 0.01em;
}

.flow__arrow {
  color: var(--gold-deep);
  text-align: left;
  font-size: 12px;
  opacity: 0.55;
  line-height: 1;
  padding-left: 25px;
  margin: 0;
}

.flow__step--terminal {
  background: linear-gradient(135deg, rgba(217, 109, 58, 0.1) 0%, rgba(139, 58, 58, 0.08) 100%);
  border-color: rgba(217, 109, 58, 0.4);
}

.flow__step--terminal .flow__step-icon {
  color: var(--ember);
}

.flow__step--terminal .flow__step-body {
  color: var(--gold-light);
  font-weight: 500;
}

@media (max-width: 768px) {
  .flow__step { padding: 12px 14px; gap: 12px; }
  .flow__step-icon { font-size: 20px; width: 28px; }
  .flow__step-body { font-size: 14px; }
  .flow__arrow { padding-left: 18px; }
}

/* --- Important badge --- */
.important-badge {
  display: inline-block;
  margin-left: 12px;
  padding: 4px 12px;
  background: var(--ember);
  color: var(--ink);
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  border-radius: 2px;
  vertical-align: middle;
  font-weight: 700;
}

/* ======================================================
   FOOTER
   ====================================================== */
.footer {
  margin-top: 80px;
  padding: 80px 32px 60px;

<!-- Content data -->

<script>
/* ======================================================
   ISEKAI Whitepaper — Renderer
   - Reads ISEKAI_CONTENT (from content.js)
   - Builds the page in either Japanese or English
   - Toggle persists in localStorage
   ====================================================== */

let currentLang = 'ja';

function getNested(obj, path) {
  return path.split('.').reduce((acc, key) => acc?.[key], obj);
}

function getText(value) {
  if (typeof value === 'string') return value;
  if (value && typeof value === 'object' && value[currentLang] !== undefined) {
    return value[currentLang];
  }
  return '';
}

function render() {
  const C = ISEKAI_CONTENT;

  // Set HTML lang attr
  document.documentElement.setAttribute('data-lang', currentLang);
  document.documentElement.setAttribute('lang', currentLang);

  // Update language toggle button label (shows current language's native name)
  document.getElementById('langToggleLabel').textContent = LANG_LABELS[currentLang];

  // Mark the active language in the dropdown
  document.querySelectorAll('.lang-dropdown button').forEach(btn => {
    btn.setAttribute('aria-current', btn.dataset.lang === currentLang ? 'true' : 'false');
  });

  // Bind all [data-key] elements
  document.querySelectorAll('[data-key]').forEach(el => {
    const key = el.getAttribute('data-key');
    const val = getNested(C, key);
    el.textContent = getText(val);
  });

  // Meta values
  document.getElementById('updatedValue').textContent = getText(C.meta.lastUpdated);

  // Nav section title
  const navTitleMap = {
    ja: '— 目次 · CHAPTERS —',
    en: '— CHAPTERS · 目次 —',
    zh: '— 目录 · CHAPTERS —',
    vi: '— MỤC LỤC · CHAPTERS —'
  };
  document.getElementById('navSectionTitle').textContent = navTitleMap[currentLang];

  // Build navigation
  const navGrid = document.getElementById('navGrid');
  navGrid.innerHTML = '';
  C.nav[currentLang].forEach((item, idx) => {
    const li = document.createElement('li');
    const a = document.createElement('a');
    a.href = `#${item.id}`;
    a.innerHTML = `<span class="num">${C.sections[idx].number}.</span>${item.label}`;
    li.appendChild(a);
    navGrid.appendChild(li);
  });

  // Build chapters
  const criticalLabelMap = {
    ja: '最重要',
    en: 'Critical',
    zh: '最重要',
    vi: 'Tối quan trọng'
  };
  const content = document.getElementById('content');
  content.innerHTML = '';
  C.sections.forEach(section => {
    const chapter = document.createElement('article');
    chapter.className = 'chapter' + (section.important ? ' chapter--important' : '');
    chapter.id = section.id;

    // Header
    const header = document.createElement('div');
    header.className = 'chapter__header';
    header.innerHTML = `
      <div class="chapter__number">${section.number}</div>
      <h2 class="chapter__title">
        <span class="chapter__icon">${section.icon}</span>${getText(section.title)}
        ${section.important ? `<span class="important-badge">${criticalLabelMap[currentLang]}</span>` : ''}
      </h2>
    `;
    chapter.appendChild(header);

    // Lead
    if (section.lead) {
      const lead = document.createElement('p');
      lead.className = 'chapter__lead';
      lead.textContent = getText(section.lead);
      chapter.appendChild(lead);
    }

    // Subsections (e.g. Boss chapter) or flat rules
    if (section.subsections) {
      section.subsections.forEach(sub => {
        const subEl = document.createElement('div');
        subEl.className = 'subsection';
        const heading = document.createElement('h3');
        heading.className = 'subsection__heading';
        heading.textContent = getText(sub.heading);
        subEl.appendChild(heading);

        if (sub.rules) {
          const ul = document.createElement('ul');
          ul.className = 'rules-list';
          sub.rules.forEach(rule => {
            const li = document.createElement('li');
            if (rule.note) li.classList.add('note');
            li.textContent = getText(rule);
            ul.appendChild(li);
          });
          subEl.appendChild(ul);
        }

        if (sub.flow) {
          const flowEl = document.createElement('div');
          flowEl.className = 'flow';
          sub.flow.forEach((step, i) => {
            if (i > 0) {
              const arrow = document.createElement('div');
              arrow.className = 'flow__arrow';
              arrow.setAttribute('aria-hidden', 'true');
              arrow.textContent = '▼';
              flowEl.appendChild(arrow);
            }
            const stepEl = document.createElement('div');
            stepEl.className = 'flow__step' + (step.terminal ? ' flow__step--terminal' : '');
            const iconEl = document.createElement('div');
            iconEl.className = 'flow__step-icon';
            iconEl.textContent = step.icon || '•';
            const bodyEl = document.createElement('div');
            bodyEl.className = 'flow__step-body';
            bodyEl.textContent = getText(step.label);
            stepEl.appendChild(iconEl);
            stepEl.appendChild(bodyEl);
            flowEl.appendChild(stepEl);
          });
          subEl.appendChild(flowEl);
        }

        chapter.appendChild(subEl);
      });
    } else if (section.rules) {
      const ul = document.createElement('ul');
      ul.className = 'rules-list';
      section.rules.forEach(rule => {
        const li = document.createElement('li');
        if (rule.note) li.classList.add('note');
        li.textContent = getText(rule);
        ul.appendChild(li);
      });
      chapter.appendChild(ul);
    }

    content.appendChild(chapter);
  });

  // Re-observe chapters for fade-in
  observeChapters();
}

const LANG_ORDER = ['ja', 'en', 'zh', 'vi'];
const LANG_LABELS = {
  ja: '日本語',
  en: 'English',
  zh: '中文',
  vi: 'Tiếng Việt'
};

function toggleLangMenu(event) {
  event.stopPropagation();
  const menu = document.getElementById('langMenu');
  const dd = document.getElementById('langDropdown');
  const toggle = document.getElementById('langToggle');
  const willOpen = dd.hidden;
  dd.hidden = !willOpen;
  menu.classList.toggle('open', willOpen);
  toggle.setAttribute('aria-expanded', String(willOpen));
}

function closeLangMenu() {
  const dd = document.getElementById('langDropdown');
  if (!dd || dd.hidden) return;
  dd.hidden = true;
  document.getElementById('langMenu').classList.remove('open');
  document.getElementById('langToggle').setAttribute('aria-expanded', 'false');
}

function selectLang(lang) {
  if (!LANG_ORDER.includes(lang)) return;
  currentLang = lang;
  try { localStorage.setItem('isekai_lang', currentLang); } catch(e) {}
  closeLangMenu();
  render();
}

document.addEventListener('click', (e) => {
  const menu = document.getElementById('langMenu');
  if (menu && !menu.contains(e.target)) closeLangMenu();
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeLangMenu();
});

function observeChapters() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, { threshold: 0.1 });
  document.querySelectorAll('.chapter').forEach(c => observer.observe(c));
}

// Init
try {
  const saved = localStorage.getItem('isekai_lang');
  if (LANG_ORDER.includes(saved)) currentLang = saved;
} catch(e) {}

document.addEventListener('DOMContentLoaded', render);

/* ======================================================
   Background video — YouTube IFrame API
   Plays JLuhzNuApGY from 5s to 80s, muted, looped silently.
   Using the API (not ?loop=1) so looping respects start/end reliably.
   ====================================================== */
const BG_VIDEO = { id: 'JLuhzNuApGY', start: 5, end: 80 };
let ytPlayer = null;

function onYouTubeIframeAPIReady() {
  ytPlayer = new YT.Player('ytPlayer', {
    videoId: BG_VIDEO.id,
    playerVars: {
      autoplay: 1,
      mute: 1,
      controls: 0,
      disablekb: 1,
      modestbranding: 1,
      playsinline: 1,
      rel: 0,
      iv_load_policy: 3,
      fs: 0,
      start: BG_VIDEO.start,
      end: BG_VIDEO.end
    },
    events: {
      onReady: (e) => {
        e.target.mute();
        e.target.playVideo();
      },
      onStateChange: (e) => {
        if (e.data === YT.PlayerState.ENDED) {
          ytPlayer.seekTo(BG_VIDEO.start, true);
          ytPlayer.playVideo();
        }
      }
    }
  });
  // Watchdog: the end= param is sometimes unreliable; enforce the boundary.
  setInterval(() => {
    if (!ytPlayer || typeof ytPlayer.getCurrentTime !== 'function') return;
    const t = ytPlayer.getCurrentTime();
    if (t >= BG_VIDEO.end) {
      ytPlayer.seekTo(BG_VIDEO.start, true);
      ytPlayer.playVideo();
    }
  }, 500);
}

(function loadYouTubeAPI() {
  const tag = document.createElement('script');
  tag.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(tag);
})();
</script>
